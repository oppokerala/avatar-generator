<!DOCTYPE html>
<html>
<head>
  <title>Avatar Generator</title>
  <style>
    body { font-family: Arial; text-align: center; background: #111; color: #fff; }
    input, button { margin: 10px; padding: 10px; }
    canvas { margin-top: 20px; border-radius: 10px; }
  </style>
</head>
<body>

<h2>Create Your Avatar</h2>

<input type="text" id="name" placeholder="Enter your name"><br>
<input type="file" id="photo"><br>
<button onclick="generate()">Generate</button>

<br>
<canvas id="canvas" width="300" height="300"></canvas><br>

<button onclick="download()">Download</button>
<button onclick="share()">Get Share Link</button>

<p id="link"></p>

<script>
let finalImage = "";

function generate() {
  const name = document.getElementById("name").value;
  const file = document.getElementById("photo").files[0];

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.onload = function () {
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,300,300);

    ctx.drawImage(img, 0, 0, 300, 300);

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(name, 20, 280);

    finalImage = canvas.toDataURL();
  };
  img.src = URL.createObjectURL(file);
}

function download() {
  const a = document.createElement("a");
  a.href = finalImage;
  a.download = "avatar.png";
  a.click();
}

function share() {
  const id = "id" + Date.now();
  localStorage.setItem(id, finalImage);

  const url = window.location.origin + "/view.html?id=" + id;
  document.getElementById("link").innerHTML = url;
}
</script>

</body>
</html>
