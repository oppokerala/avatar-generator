<!DOCTYPE html>
<html>
<head>
  <title>Avatar Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f0f0f;
      color: white;
    }
    input, button {
      margin: 10px;
      padding: 10px;
    }
    canvas {
      margin-top: 20px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h2>Create Your Avatar</h2>

<input type="text" id="name" placeholder="Enter your name"><br>
<input type="file" id="photo"><br>
<button onclick="generate()">Generate</button>

<br>
<canvas id="canvas" width="400" height="500"></canvas><br>

<script>
function generate() {
  const name = document.getElementById("name").value;
  const file = document.getElementById("photo").files[0];

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const userImg = new Image();
  const frameImg = new Image();

  // 👉 Replace this with your frame image URL
  frameImg.src = "https://i.imgur.com/your-frame.png";

  userImg.onload = function () {
    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1️⃣ Draw background
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2️⃣ Draw user photo inside frame area
    // Adjust these values to fit your frame
    ctx.drawImage(userImg, 100, 120, 200, 200);

    // 3️⃣ Draw frame on top
    frameImg.onload = function () {
      ctx.drawImage(frameImg, 0, 0, 400, 500);

      // 4️⃣ Add name text
      ctx.fillStyle = "#fff";
      ctx.font = "bold 24px Arial";
      ctx.textAlign = "center";
      ctx.fillText(name, 200, 450);
    };
  };

  userImg.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
