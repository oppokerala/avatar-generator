<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPPO Kerala Avatar Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 20px;
    }

    .preview-section {
      flex: 1;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
    }

    .form-section {
      width: 350px;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
    }

    canvas {
      width: 100%;
      border-radius: 10px;
      background: #000;
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-family: inherit;
    }

    button {
      background: #16a34a;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Preview -->
  <div class="preview-section">
    <h3>Live Preview</h3>
    <canvas id="posterCanvas" width="1125" height="2000"></canvas>
    <button onclick="downloadImage()">Download</button>
  </div>

  <!-- Form -->
  <div class="form-section">
    <h3>Enter Details</h3>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="shop" placeholder="Enter Shop Name">
    <input type="text" id="mobile" placeholder="Enter Mobile Number">
    <input type="text" id="address" maxlength="30" placeholder="Enter Address">

    <input type="file" id="photo">

  </div>

</div>

<script>
const canvas = document.getElementById("posterCanvas");
const ctx = canvas.getContext("2d");

const bg = new Image();
bg.src = "https://oppokerala.github.io/avatar-generator/avatarf33.png"; // 👈 keep your poster image

let userImage = null;

// Inputs
const nameInput = document.getElementById("name");
const shopInput = document.getElementById("shop");
const mobInput = document.getElementById("mobile");
const addrInput = document.getElementById("address");

// Photo upload
document.getElementById("photo").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const img = new Image();

  img.onload = function() {
    userImage = img;
    drawCanvas();
  };

  img.src = URL.createObjectURL(file);
});

// Live update
[nameInput, shopInput, mobInput, addrInput].forEach(input => {
  input.addEventListener("input", drawCanvas);
});

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.drawImage(bg, 0, 0, 1125, 2000);

  // USER PHOTO (adjust position here)
  if (userImage) {
    ctx.save();

    // Circle crop (optional)
    ctx.beginPath();
    ctx.arc(300, 590, 140, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(userImage, 130, 500, 340, 340);
    ctx.restore();
  }

  // TEXT
  ctx.fillStyle = "#000";
  ctx.font = "bold 46px Poppins";
  ctx.fillText(nameInput.value, 485, 650);

  ctx.fillStyle = "#555";
  ctx.font = "26px Poppins";
  ctx.fillText(mobInput.value, 485, 710);

  ctx.fillStyle = "#1a5c3a";
  ctx.font = "bold 42px Poppins";
  ctx.fillText(shopInput.value, 485, 770);

  ctx.fillStyle = "#666";
  ctx.font = "24px Poppins";
  ctx.fillText(addrInput.value, 485, 830);
}

// Download
function downloadImage() {
  const link = document.createElement("a");
  link.download = "poster.png";
  link.href = canvas.toDataURL();
  link.click();
}

// Initial render
bg.onload = drawCanvas;
</script>

</body>
</html>
